name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to Latest
        run: npm install -g npm@latest

      - name: Clean Install Dependencies
        run: npm ci

      # Hardened Pipeline Guard: Explicitly strips sensitive/ignored files 
      # from the runner's workspace directory before compiling the tarball.
      # This provides secondary layered security even if npm configurations shift.
      - name: Pre-Publish Workspace Sanitization
        run: |
          rm -rf tests/
          rm -f .env*
          rm -rf .github/
          rm -f config/local.json
          rm -f *.log
          rm -f CODE_OF_CONDUCT.md CONTRIBUTING.md RELEASES.md

      - name: Publish to npm Registry with Provenance
        run: npm publish --access public --provenance