name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Thank you for opening your first issue! 🎉 We appreciate your feedback and contribution to the project. Please ensure you have provided all relevant reproduction steps, logs, and environment details as outlined in our CONTRIBUTING.md guidelines. A maintainer will review your report shortly."
        pr-message: "Thank you for submitting your first pull request! 🚀 We appreciate the time and effort you spent on this contribution. Please make sure your code adheres to our project styling standards and that all automated unit tests pass. A member of our development team will review your code and provide feedback soon."
